<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>レッスン予約</title>
  <!-- LIFF SDK: LINE のログイン情報・プロフィールを取得するためのライブラリ -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <!-- Tailwind CSS: ユーティリティ CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ─── 基本リセット ──────────────────────────────────────────────── */
    *, *::before, *::after {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans',
                   'Noto Sans JP', 'Yu Gothic', sans-serif;
      overscroll-behavior: none;
      background: #f3f4f6;
    }
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }

    /* ─── iOS セーフエリア（ノッチ対応） ─────────────────────────────── */
    .safe-top    { padding-top:    max(20px, env(safe-area-inset-top)); }
    .safe-bottom { padding-bottom: max(24px, env(safe-area-inset-bottom)); }

    /* ─── 画面管理 ───────────────────────────────────────────────────── */
    .screen { display: none; min-height: 100dvh; flex-direction: column; }
    .screen.active { display: flex; }

    /* ─── タップエフェクト ───────────────────────────────────────────── */
    .tappable { transition: transform 0.1s ease, opacity 0.1s ease; cursor: pointer; }
    .tappable:active { transform: scale(0.94); opacity: 0.72; }

    /* ─── スピナー ───────────────────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.75s linear infinite; }

    /* ─── ヘッダーグラデーション ─────────────────────────────────────── */
    .grad { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); }

    /* ─── 先生アバター（名前の頭文字を表示する円） ───────────────────── */
    .teacher-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; color: white;
      flex-shrink: 0;
    }

    /* ─── 週カレンダーの日ボタン ─────────────────────────────────────── */
    .day-card {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 10px 2px; border-radius: 18px;
      transition: transform 0.1s ease;
    }
    .day-card.can-book { cursor: pointer; }
    .day-card.can-book:active { transform: scale(0.90); }

    /* ─── スロット行（共通ベース）────────────────────────────────────── */
    .slot-row {
      display: flex; align-items: center;
      padding: 11px 14px;
      border-radius: 14px;
      background: white;
      border: 1px solid #f3f4f6;
      gap: 12px;
      width: 100%;
      text-align: left;
    }

    /* ─── 空き枠スロット ─────────────────────────────────────────────── */
    .slot-row.available {
      background: #f0fdf4;
      border-color: #bbf7d0;
      padding: 14px 16px;
      cursor: pointer;
      transition: transform 0.1s ease;
    }
    .slot-row.available:active { transform: scale(0.98); }

    /* 空き枠: 時刻テキスト */
    .slot-avail-time {
      font-size: 16px; font-weight: 800; color: #059669;
      min-width: 52px; flex-shrink: 0;
    }
    /* 空き枠: 緑の◯サークル */
    .slot-avail-circle {
      width: 34px; height: 34px; border-radius: 50%;
      background: #059669;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 17px; font-weight: 900;
      flex-shrink: 0;
    }
    /* 空き枠: テキスト（空き + @スタジオ） */
    .slot-avail-body { flex: 1; }
    .slot-avail-label {
      font-size: 14px; font-weight: 800; color: #059669; display: block;
    }
    .slot-avail-studio {
      font-size: 11px; color: #6b7280; display: block; margin-top: 2px;
    }
    /* 空き枠: > 矢印 */
    .slot-arrow {
      font-size: 18px; color: #34d399; flex-shrink: 0;
      font-weight: 700; line-height: 1;
    }

    /* ─── 受付不可スロット ───────────────────────────────────────────── */
    /* 受付不可: 時刻テキスト */
    .slot-time-gray {
      font-size: 14px; font-weight: 500; color: #9ca3af;
      min-width: 52px; flex-shrink: 0;
    }
    /* 受付不可: グレーの×サークル */
    .slot-unavail-circle {
      width: 28px; height: 28px; border-radius: 50%;
      background: #f3f4f6;
      display: flex; align-items: center; justify-content: center;
      color: #9ca3af; font-size: 11px; font-weight: 700;
      flex-shrink: 0;
    }

    /* ─── 時間帯グループのセクション見出し ───────────────────────────── */
    .time-group-label {
      font-size: 12px; font-weight: 700; color: #9ca3af;
      padding: 16px 0 8px;
      letter-spacing: 0.02em;
    }

    /* ─── 選択した日付の帯 ───────────────────────────────────────────── */
    .day-selected-bar {
      background: white;
      border-top: 1px solid #f3f4f6;
      border-bottom: 1px solid #f3f4f6;
      padding: 12px 16px;
    }

    /* 枠数バッジ（緑） */
    .count-badge {
      background: #d1fae5; color: #059669;
      font-size: 11px; font-weight: 800;
      padding: 3px 10px; border-radius: 999px;
      white-space: nowrap;
    }

    /* 更新ボタン */
    .refresh-btn {
      width: 30px; height: 30px; border-radius: 50%;
      background: #f3f4f6; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform 0.3s ease;
    }
    .refresh-btn:active { transform: rotate(180deg); }

    /* ─── 予約確認ボトムシート ────────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      display: none; align-items: flex-end;
    }
    .overlay.open { display: flex; }
    .sheet {
      width: 100%; background: white;
      border-radius: 28px 28px 0 0;
      padding: 20px 20px 0;
      padding-bottom: max(32px, env(safe-area-inset-bottom));
      max-height: 92dvh; overflow-y: auto;
    }

    /* ─── 時間選択ボタン ─────────────────────────────────────────────── */
    .dur-btn {
      flex: 1; padding: 10px 4px;
      border-radius: 12px;
      border: 2px solid #e5e7eb; background: white;
      font-size: 13px; font-weight: 700; color: #6b7280;
      transition: all 0.12s ease; cursor: pointer;
    }
    .dur-btn.selected {
      border-color: #6366f1; background: #eef2ff; color: #4f46e5;
    }
    .dur-btn:disabled { opacity: 0.28; cursor: not-allowed; }

    /* ─── テキスト入力 ───────────────────────────────────────────────── */
    .field {
      width: 100%; border: 1.5px solid #e5e7eb; border-radius: 14px;
      padding: 13px 16px; font-size: 16px; color: #1f2937;
      background: white;
      transition: border-color 0.15s;
    }
    .field::placeholder { color: #d1d5db; }
    .field:focus { outline: none; border-color: #6366f1; }

    /* ─── 週グリッドカレンダー ────────────────────────────────────────── */
    #week-grid-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      /* 右端に「まだ続く」を示すフェードシャドウ */
      background:
        linear-gradient(to right, white 0%, transparent 24px) left / 24px 100% no-repeat,
        linear-gradient(to left,  #e0e7ff 0%, transparent 24px) right / 24px 100% no-repeat;
      background-attachment: local, scroll;
    }

    /* グリッド本体: 時刻列（固定幅）+ 7日列（最小幅保証で横スクロール） */
    .wg-table {
      display: grid;
      grid-template-columns: 42px repeat(7, minmax(44px, 1fr));
      gap: 3px 4px;
      min-width: 352px; /* 42 + 7×44 = 350px、余白2px */
    }

    /* 曜日ヘッダーセル */
    .wg-day-head {
      text-align: center; padding: 0 2px 12px;
    }
    .wg-day-name { display: block; font-size: 12px; font-weight: 700; color: #9ca3af; }
    .wg-day-num  {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; font-size: 16px; font-weight: 800; color: #111827;
      border-radius: 50%;
    }
    .wg-day-head.is-today .wg-day-name { color: #818cf8; }
    .wg-day-head.is-today .wg-day-num  {
      background: linear-gradient(135deg,#6366f1,#8b5cf6); color: white;
    }
    .wg-day-head.is-sat .wg-day-name { color: #60a5fa; }
    .wg-day-head.is-sat .wg-day-num  { color: #3b82f6; }
    .wg-day-head.is-sun .wg-day-name { color: #f87171; }
    .wg-day-head.is-sun .wg-day-num  { color: #ef4444; }

    /* 時刻ラベル */
    .wg-time {
      font-size: 12px; font-weight: 600; color: #9ca3af;
      display: flex; align-items: center; justify-content: flex-end;
      padding-right: 6px; height: 54px; white-space: nowrap;
    }

    /* セル */
    .wg-cell {
      height: 54px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700;
    }
    .wg-cell.avail {
      background: #dcfce7; color: #16a34a;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.12s ease;
    }
    .wg-cell.avail:active { transform: scale(0.84); background: #bbf7d0; }
    .wg-cell.unavail { background: #f3f4f6; color: #d1d5db; font-size: 15px; }
    .wg-cell.empty   { background: transparent; }
    /* 空きコーナーセル（時刻列のヘッダー行） */
    .wg-corner { height: auto; }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════════════════════════
     画面①: 読み込み中
════════════════════════════════════════════════════════════════ -->
<div id="screen-loading" class="screen active grad items-center justify-center">
  <div class="text-center text-white">
    <div class="w-14 h-14 border-4 border-white border-t-transparent rounded-full spinner mx-auto mb-5"></div>
    <p id="loading-text" class="text-base font-medium opacity-80">読み込み中...</p>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════
     画面②: エラー
════════════════════════════════════════════════════════════════ -->
<div id="screen-error" class="screen items-center justify-center px-8">
  <div class="text-center">
    <div class="text-6xl mb-5">⚠️</div>
    <p id="error-msg" class="text-gray-600 text-sm leading-relaxed mb-6 whitespace-pre-line"></p>
    <button onclick="location.reload()"
      class="px-8 py-3 grad text-white rounded-2xl font-semibold tappable text-sm">
      再試行
    </button>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════
     画面③: メイン（週間カレンダー ＋ スロット一覧 を1画面に統合）
════════════════════════════════════════════════════════════════ -->
<div id="screen-main" class="screen">

  <!-- グラデーションヘッダー（先生プロフィール＋週ナビゲーション） -->
  <div class="grad text-white flex-shrink-0 safe-top px-5 pb-5">

    <!-- 先生プロフィール行 -->
    <div class="flex items-center gap-3 mb-4">
      <!-- アバター: 名前の頭文字を表示 -->
      <div class="teacher-avatar">大</div>
      <div class="flex-1 min-w-0">
        <p class="font-bold text-base leading-tight">大橋 優平 先生</p>
        <p class="text-xs mt-0.5" style="opacity:0.75;">
          社交ダンス · 齊藤DG / 仙台SS / 泉中央
        </p>
      </div>
      <!-- 右端: ログイン中の予約者名 -->
      <div class="text-right flex-shrink-0">
        <p class="text-xs" style="opacity:0.6;">予約者</p>
        <p id="cal-username" class="text-sm font-semibold max-w-[100px] truncate"></p>
      </div>
    </div>

    <!-- 週ナビゲーション -->
    <div class="flex items-center gap-2">
      <button id="btn-prev" onclick="prevWeek()"
        class="w-9 h-9 rounded-full flex items-center justify-center tappable flex-shrink-0"
        style="background:rgba(255,255,255,0.18);" aria-label="前の週">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="white" stroke-width="2.5" stroke-linecap="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
      <p id="cal-week-label" class="flex-1 text-center text-sm font-semibold"></p>
      <button id="btn-next" onclick="nextWeek()"
        class="w-9 h-9 rounded-full flex items-center justify-center tappable flex-shrink-0"
        style="background:rgba(255,255,255,0.18);" aria-label="次の週">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="white" stroke-width="2.5" stroke-linecap="round">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- スクロール可能なコンテンツ領域 -->
  <div class="flex-1 overflow-y-auto bg-white">

    <!-- 週グリッドカレンダー -->
    <div class="pt-4 pb-2 px-3">

      <!-- 読み込み中スピナー -->
      <div id="week-grid-spinner" class="flex justify-center py-12">
        <div class="w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full spinner"></div>
      </div>

      <!-- この週に空き枠が1つもない場合 -->
      <p id="week-grid-empty" class="text-center text-gray-400 text-sm py-12"
         style="display:none;">
        この週は空き枠がありません
      </p>
    </div>

    <!-- グリッド本体（横スクロール領域） -->
    <div id="week-grid-wrap" class="px-3 pb-2" style="display:none;">
      <div id="week-grid"></div>
    </div>

    <!-- 凡例 ＋ 横スクロールヒント -->
    <div id="week-grid-footer" class="pb-4 px-3" style="display:none;">
      <div class="flex items-center justify-between mt-3">
        <!-- 凡例 -->
        <div class="flex items-center gap-3">
          <span class="flex items-center gap-1.5 text-xs text-gray-500">
            <span style="display:inline-block;width:20px;height:20px;border-radius:6px;background:#dcfce7;font-size:13px;line-height:20px;text-align:center;color:#16a34a;font-weight:700;">○</span>
            空き
          </span>
          <span class="flex items-center gap-1.5 text-xs text-gray-500">
            <span style="display:inline-block;width:20px;height:20px;border-radius:6px;background:#f3f4f6;font-size:12px;line-height:20px;text-align:center;color:#d1d5db;font-weight:700;">×</span>
            受付不可
          </span>
        </div>
        <!-- 横スクロールヒント（小さい画面だけ表示） -->
        <p class="text-xs text-indigo-300 font-medium">← 横にスクロール →</p>
      </div>
    </div>

    <!-- iOS ホームバー対応の底部パディング -->
    <div class="safe-bottom"></div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════
     ボトムシート: 予約確認
════════════════════════════════════════════════════════════════ -->
<div id="booking-overlay" class="overlay" onclick="onOverlayTap(event)">
  <div class="sheet">

    <!-- ハンドルバー -->
    <div class="w-10 h-1 bg-gray-200 rounded-full mx-auto mb-5"></div>

    <h3 class="text-lg font-bold text-gray-800 mb-4">予約リクエスト</h3>

    <!-- 選択日時（ハイライトカード） -->
    <div class="rounded-2xl p-4 mb-5"
         style="background:linear-gradient(135deg,#eef2ff,#f5f3ff);">
      <p id="bk-date-label" class="text-indigo-800 font-bold text-center text-sm"></p>
      <p id="bk-time-label" class="text-indigo-600 font-semibold text-center text-base mt-0.5"></p>
    </div>

    <!-- レッスン時間（30/60/90/120分） -->
    <div class="mb-5">
      <p class="text-sm font-bold text-gray-700 mb-2">レッスン時間</p>
      <div id="dur-btns" class="flex gap-2"></div>
    </div>

    <!-- お名前（LINE 表示名を初期値として自動入力） -->
    <div class="mb-4">
      <label class="block text-sm font-bold text-gray-700 mb-1.5">
        お名前 <span class="text-red-500">*</span>
      </label>
      <input id="input-name" type="text" placeholder="山田 花子" autocomplete="name"
             class="field">
    </div>

    <!-- メモ -->
    <div class="mb-5">
      <label class="block text-sm font-bold text-gray-700 mb-1.5">
        ご要望・メモ
        <span class="text-gray-400 font-normal">（任意）</span>
      </label>
      <textarea id="input-note" rows="2" placeholder="ご要望があればご記入ください"
                class="field resize-none"></textarea>
    </div>

    <!-- エラーメッセージ -->
    <p id="bk-error" class="text-red-500 text-sm text-center mb-3" style="display:none;"></p>

    <!-- 送信ボタン -->
    <button id="bk-submit" onclick="submitBooking()"
      class="w-full py-4 grad text-white font-bold text-base rounded-2xl tappable mb-2
             disabled:opacity-50 disabled:cursor-not-allowed">
      予約リクエストを送る
    </button>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════
     画面④: 送信完了
════════════════════════════════════════════════════════════════ -->
<div id="screen-done" class="screen items-center justify-center px-6 safe-bottom"
     style="background:linear-gradient(135deg,#f0fdf4,#ecfdf5);">
  <div class="text-center w-full max-w-xs">
    <div class="w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6"
         style="background:linear-gradient(135deg,#d1fae5,#a7f3d0);">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
           stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6L9 17l-5-5"/>
      </svg>
    </div>
    <h2 class="text-2xl font-bold text-gray-800 mb-2">送信しました！</h2>
    <p class="text-gray-500 text-sm leading-relaxed mb-8">
      予約リクエストを受け付けました。<br>
      確認後、LINE でご連絡いたします。
    </p>
    <button onclick="backToCalendar()"
      class="w-full py-4 grad text-white font-bold rounded-2xl tappable mb-3">
      別の日を予約する
    </button>
    <button onclick="closeLiff()"
      class="w-full py-3 text-gray-400 font-medium text-sm tappable">
      閉じる
    </button>
  </div>
</div>


<!-- ════════════════════════════════════════════════════════════
     JavaScript
════════════════════════════════════════════════════════════════ -->
<script>
// ─── 定数 ─────────────────────────────────────────────────────────────────────

const LIFF_ID = '2009927661-Q0Kvqlvn';

const API_URL = 'https://script.google.com/macros/s/AKfycbxoYZ1uagSAaoF3PSRl0DBkpD1xSDxfMUVI1tg3Q-sq8eYxXUGTBmE_BmJ9w8ONUC8/exec';

// 曜日の短縮表示（月〜日）
const DAY_NAMES = ['月', '火', '水', '木', '金', '土', '日'];

// スタジオ ID → 正式名称の変換マップ（GAS の line.js と合わせること）
const STUDIO_LABELS = {
  saito:  '齊藤ダンスガーデン',
  sendai: '仙台サテライトスタジオ',
  izumi:  '西塚ダンスアートアカデミー',
};

// ─── アプリ状態変数 ────────────────────────────────────────────────────────────

let lineUserId       = '';   // LINE ユーザー ID
let lineDisplayName  = '';   // LINE 表示名（予約フォームの初期値に使う）
let currentWeekStart = null; // 現在表示中の週の月曜日（Date オブジェクト）
let currentDayData   = null; // 予約シートを開いた日のスロット一覧
let selectedDate     = '';   // 選択中の日付（YYYY-MM-DD）
let selectedSlotIdx  = -1;   // 選択中のスロット index
let selectedDuration = 30;   // 選択中のレッスン時間（分）
let weekSlotsData    = {};   // { 'YYYY-MM-DD': { slots: [...] } } 週の全日分キャッシュ

// ─── ユーティリティ ────────────────────────────────────────────────────────────

/** Date → 'YYYY-MM-DD' */
function fmtDate(d) {
  const y  = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${mm}-${dd}`;
}

/**
 * 指定日が属する週の月曜日を返す。
 * JS の getDay() は 0=日〜6=土 なので変換が必要。
 */
function getMonday(d) {
  const date   = new Date(d);
  date.setHours(0, 0, 0, 0);
  const jsDay  = date.getDay();
  const diff   = (jsDay === 0) ? -6 : 1 - jsDay;
  date.setDate(date.getDate() + diff);
  return date;
}

/** JS曜日番号（0=日）→ システム曜日番号（0=月）*/
function jsDayToSys(jsDay) {
  return (jsDay + 6) % 7;
}

/**
 * GAS Web App API を fetch() で呼ぶ共通ヘルパー。
 * 成功時は json.data を返し、失敗時は Error を throw する。
 *
 * 書き込み系アクション（booking_request）は POST で送信する。
 * 生徒の名前・メモ・LINE ID を URL に載せないためのセキュリティ対策。
 * 読み取り系（availability / availability_week）は認証不要なので GET のまま。
 */
async function apiFetch(queryParams) {
  const POST_ACTIONS = ['booking_request'];
  let res;
  if (POST_ACTIONS.includes(queryParams.action)) {
    // POST: body に JSON を乗せて送信（Content-Type: text/plain で CORS プリフライトを回避）
    res = await fetch(API_URL, {
      method: 'POST',
      redirect: 'follow',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(queryParams),
    });
  } else {
    // GET: クエリパラメータとして送信（読み取り専用）
    const url = API_URL + '?' + new URLSearchParams(queryParams).toString();
    res = await fetch(url, { redirect: 'follow' });
  }
  if (!res.ok) throw new Error(`HTTP エラー: ${res.status}`);
  const json = await res.json();
  if (!json.success) {
    throw new Error(
      (json.error && json.error.message) ? json.error.message : 'APIエラー'
    );
  }
  return json.data;
}

// ─── 画面切り替え ─────────────────────────────────────────────────────────────

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showMain()  { showScreen('screen-main'); }

function showError(msg) {
  document.getElementById('error-msg').textContent = msg || 'エラーが発生しました';
  showScreen('screen-error');
}

// ─── 初期化（アプリ起動時に1回だけ実行） ──────────────────────────────────────

async function init() {
  try {
    // LIFF を初期化する（LINE SDK がユーザー情報を取得できるようになる）
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login(); // 未ログインならログイン画面へ
      return;
    }

    const profile    = await liff.getProfile();
    lineUserId       = profile.userId;
    lineDisplayName  = profile.displayName;

    // ヘッダーの「予約者」欄に LINE 表示名をセット
    document.getElementById('cal-username').textContent = lineDisplayName;

    currentWeekStart = getMonday(new Date());
    await loadWeek(currentWeekStart);
    showMain();

  } catch (err) {
    console.error('[LIFF init error]', err);
    showError(
      '初期化に失敗しました。\nLINE アプリから開き直してください。\n\n' +
      (err.message || String(err))
    );
  }
}

// ─── 週グリッドカレンダー ──────────────────────────────────────────────────────

/**
 * 指定の月曜日から始まる週の空き枠グリッドを読み込んで描画する。
 * 7日分の availability を並列で取得し、縦軸=時間帯・横軸=曜日のグリッドを表示する。
 */
async function loadWeek(mondayDate) {
  // ヘッダーの週ラベルを更新（例: 4/28（月）〜 5/4（日））
  const sunDate = new Date(mondayDate);
  sunDate.setDate(sunDate.getDate() + 6);
  document.getElementById('cal-week-label').textContent =
    `${mondayDate.getMonth()+1}/${mondayDate.getDate()}（月）`
    + ` 〜 ${sunDate.getMonth()+1}/${sunDate.getDate()}（日）`;

  // 今週より前には戻れないように「前の週へ」ボタンを無効化
  const thisWeek   = getMonday(new Date());
  const isThisWeek = mondayDate.getTime() <= thisWeek.getTime();
  const prevBtn    = document.getElementById('btn-prev');
  prevBtn.style.opacity = isThisWeek ? '0.3' : '1';
  prevBtn.disabled      = isThisWeek;

  // 今日から4週先（上限）を超えたら「次の週へ」ボタンを無効化
  const maxWeek = new Date(thisWeek);
  maxWeek.setDate(maxWeek.getDate() + 4 * 7);
  const isMaxWeek = mondayDate.getTime() >= maxWeek.getTime();
  const nextBtn   = document.getElementById('btn-next');
  nextBtn.style.opacity = isMaxWeek ? '0.3' : '1';
  nextBtn.disabled      = isMaxWeek;

  // スピナーを表示してグリッドを隠す
  document.getElementById('week-grid-spinner').style.display  = 'flex';
  document.getElementById('week-grid-wrap').style.display     = 'none';
  document.getElementById('week-grid-footer').style.display   = 'none';
  document.getElementById('week-grid-empty').style.display    = 'none';

  try {
    // 月曜〜日曜の日付文字列を生成
    const dates = Array.from({ length: 7 }, (_, i) => {
      const d = new Date(mondayDate);
      d.setDate(d.getDate() + i);
      return fmtDate(d);
    });

    // 7日分の空き枠データを並列取得
    const results = await Promise.all(
      dates.map(date => apiFetch({ action: 'availability', date }))
    );

    // キャッシュに保存
    weekSlotsData = {};
    const days = dates.map((date, i) => {
      weekSlotsData[date] = results[i];
      return { date, slots: results[i].slots || [] };
    });

    renderWeekGrid(days);

  } catch (err) {
    showError('カレンダーの読み込みに失敗しました。\n時間をおいて再試行してください。');
  }
}

/**
 * 7日分のスロットデータを週グリッドとして描画する。
 * 縦軸 = 空き枠が1つ以上存在する時間帯（重複排除・昇順ソート）
 * 横軸 = 月〜日の7列
 * セルをタップすると openBookingSheetFromGrid() を呼ぶ。
 */
function renderWeekGrid(days) {
  const todayStr = fmtDate(new Date());

  // 週全体に登場する start_time を収集（重複なし・昇順）
  const timesSet = new Set();
  days.forEach(d => (d.slots || []).forEach(s => timesSet.add(s.start_time)));
  const times = [...timesSet].sort();

  document.getElementById('week-grid-spinner').style.display = 'none';

  if (times.length === 0) {
    document.getElementById('week-grid-empty').style.display = 'block';
    return;
  }


  // ─── HTML 生成 ───────────────────────────────────────────────────
  let html = '<div class="wg-table">';

  // ヘッダー行: 左上コーナー + 7つの日付ヘッダー
  html += '<div class="wg-corner"></div>';
  days.forEach((d, i) => {
    const [, , dd] = d.date.split('-');
    const isToday = d.date === todayStr;
    const cls = ['wg-day-head', isToday ? 'is-today' : '', i === 5 ? 'is-sat' : '', i === 6 ? 'is-sun' : '']
      .filter(Boolean).join(' ');
    html += `<div class="${cls}">
      <span class="wg-day-name">${DAY_NAMES[i]}</span>
      <span class="wg-day-num">${parseInt(dd, 10)}</span>
    </div>`;
  });

  // スロット行: 各時刻 × 各日のセル
  times.forEach(time => {
    // 時刻ラベル（例: 10:00）
    html += `<div class="wg-time">${time}</div>`;

    days.forEach(d => {
      const slotArr = d.slots || [];
      const slotIdx = slotArr.findIndex(s => s.start_time === time);

      if (slotIdx === -1) {
        // この日にはそのスロット自体が存在しない
        html += '<div class="wg-cell empty"></div>';
      } else {
        const slot = slotArr[slotIdx];
        const isPast = d.date < todayStr;

        if (slot.available && !isPast) {
          // タップ可能な空き枠
          html += `<button class="wg-cell avail"
            onclick="openBookingSheetFromGrid('${d.date}',${slotIdx})"
            aria-label="${d.date} ${time} 空き">○</button>`;
        } else {
          // 受付不可（先生ブロック・既予約・過去日）
          html += '<div class="wg-cell unavail">×</div>';
        }
      }
    });
  });

  html += '</div>';

  document.getElementById('week-grid').innerHTML = html;
  document.getElementById('week-grid-wrap').style.display   = 'block';
  document.getElementById('week-grid-footer').style.display = 'block';
}

/**
 * グリッドのセルをタップしたとき: 対象の日・スロットの予約シートを開く。
 * @param {string} dateStr  YYYY-MM-DD
 * @param {number} slotIdx  weekSlotsData[dateStr].slots のインデックス
 */
function openBookingSheetFromGrid(dateStr, slotIdx) {
  selectedDate   = dateStr;
  currentDayData = weekSlotsData[dateStr];
  openBookingSheet(slotIdx);
}

/** 前の週へ */
async function prevWeek() {
  const prev = new Date(currentWeekStart);
  prev.setDate(prev.getDate() - 7);
  const thisWeek = getMonday(new Date());
  if (prev.getTime() < thisWeek.getTime()) return;
  currentWeekStart = prev;
  await loadWeek(currentWeekStart);
}

/** 次の週へ */
async function nextWeek() {
  const next = new Date(currentWeekStart);
  next.setDate(next.getDate() + 7);
  const maxWeek = getMonday(new Date());
  maxWeek.setDate(maxWeek.getDate() + 4 * 7);
  if (next.getTime() > maxWeek.getTime()) return;
  currentWeekStart = next;
  await loadWeek(currentWeekStart);
}

// ─── 予約確認シート ────────────────────────────────────────────────────────────

/**
 * 空きスロットをタップしたとき: 予約確認ボトムシートを開く。
 * @param {number} startIdx  currentDayData.slots の開始インデックス
 */
function openBookingSheet(startIdx) {
  selectedSlotIdx  = startIdx;
  selectedDuration = 30; // デフォルトは 30 分

  // 日付ラベルを更新
  const [, m, d] = selectedDate.split('-');
  const sysDay   = jsDayToSys(new Date(selectedDate + 'T00:00:00').getDay());
  document.getElementById('bk-date-label').textContent =
    `${parseInt(m)}月${parseInt(d)}日（${DAY_NAMES[sysDay]}）`;

  // 連続して予約できる最大スロット数を計算してボタンを描画
  const maxSlots = calcMaxConsecutive(startIdx);
  renderDurationButtons(startIdx, maxSlots);
  updateTimeLabel(startIdx, 30);

  // フォームをリセット（LINE 表示名を名前欄の初期値にセット）
  document.getElementById('input-name').value        = lineDisplayName || '';
  document.getElementById('input-note').value        = '';
  document.getElementById('bk-error').style.display  = 'none';
  const submitBtn = document.getElementById('bk-submit');
  submitBtn.disabled    = false;
  submitBtn.textContent = '予約リクエストを送る';

  document.getElementById('booking-overlay').classList.add('open');
}

/**
 * 指定インデックスから連続して空いているスロット数を返す（最大 4 = 2時間）。
 */
function calcMaxConsecutive(startIdx) {
  const slots = currentDayData.slots;
  let count = 0;
  for (let i = startIdx; i < slots.length && count < 4; i++) {
    if (!slots[i].available) break;
    count++;
  }
  return count;
}

/** 時間選択ボタン（30分/60分/90分/120分）を描画する */
function renderDurationButtons(startIdx, maxSlots) {
  const labels = ['30分', '60分', '90分', '120分'];
  document.getElementById('dur-btns').innerHTML = labels.map((label, i) => {
    const slots    = i + 1;
    const disabled = slots > maxSlots;
    const selected = slots === 1;
    return `<button class="dur-btn${selected ? ' selected' : ''}"
      onclick="pickDuration(${startIdx}, ${slots * 30})"
      ${disabled ? 'disabled' : ''}>${label}</button>`;
  }).join('');
}

/** 時間ボタンを選択したとき: ラベルと選択状態を更新する */
function pickDuration(startIdx, minutes) {
  selectedDuration = minutes;
  updateTimeLabel(startIdx, minutes);
  document.querySelectorAll('.dur-btn').forEach((btn, i) => {
    btn.classList.toggle('selected', (i + 1) * 30 === minutes);
  });
}

/** シート上の「○○:○○ 〜 ○○:○○」ラベルを更新する */
function updateTimeLabel(startIdx, durationMin) {
  const slots   = currentDayData.slots;
  const endIdx  = startIdx + (durationMin / 30) - 1;
  const safeEnd = Math.min(endIdx, slots.length - 1);
  document.getElementById('bk-time-label').textContent =
    `${slots[startIdx].start_time} 〜 ${slots[safeEnd].end_time}`;
}

/** オーバーレイ（シートの外側）をタップしたらシートを閉じる */
function onOverlayTap(e) {
  if (e.target === document.getElementById('booking-overlay')) {
    document.getElementById('booking-overlay').classList.remove('open');
  }
}

// ─── 予約送信 ─────────────────────────────────────────────────────────────────

async function submitBooking() {
  const name      = document.getElementById('input-name').value.trim();
  const note      = document.getElementById('input-note').value.trim();
  const errEl     = document.getElementById('bk-error');
  const submitBtn = document.getElementById('bk-submit');

  if (!name) {
    errEl.textContent   = 'お名前を入力してください';
    errEl.style.display = 'block';
    return;
  }

  errEl.style.display   = 'none';
  submitBtn.disabled    = true;
  submitBtn.textContent = '送信中...';

  const slots     = currentDayData.slots;
  const startSlot = slots[selectedSlotIdx];
  const endSlot   = slots[selectedSlotIdx + (selectedDuration / 30) - 1];

  try {
    await apiFetch({
      action:             'booking_request',
      student_name_input: name,
      requested_date:     selectedDate,
      requested_start:    startSlot.start_time,
      requested_end:      endSlot.end_time,
      studio_id:          startSlot.studio_id,
      note:               note       || '',
      line_user_id:       lineUserId || '',
    });

    document.getElementById('booking-overlay').classList.remove('open');
    showScreen('screen-done');

  } catch (err) {
    // エラー時はシートを閉じずに、シート内のエラー欄にメッセージを表示する。
    // シートを閉じると入力内容が失われて生徒が再入力しなければならなくなるため。
    errEl.textContent   = err.message || '通信エラーが発生しました。時間をおいて再試行してください。';
    errEl.style.display = 'block';
    submitBtn.disabled    = false;
    submitBtn.textContent = '予約リクエストを送る';
  }
}

// ─── 完了後の操作 ─────────────────────────────────────────────────────────────

/** 完了画面から「別の日を予約する」ボタン */
function backToCalendar() {
  showMain();
  loadWeek(currentWeekStart); // カレンダーを再読み込みして最新の空き状況を反映
}

/** LIFF ウィンドウを閉じる（LINE アプリ内の場合は LINE が前面に戻る） */
function closeLiff() {
  if (liff.isInClient()) {
    liff.closeWindow();
  } else {
    window.close();
  }
}

// ─── 起動 ─────────────────────────────────────────────────────────────────────
window.addEventListener('load', init);
</script>
