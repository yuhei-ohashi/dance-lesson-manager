<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予約管理 | ダンス手帳</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans',
                   'Noto Sans JP', 'Yu Gothic', sans-serif;
      background: #f3f4f6;
    }
    .grad { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.75s linear infinite; }
    .card {
      background: white; border-radius: 16px;
      padding: 20px; margin-bottom: 12px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      border: 1px solid #e5e7eb;
    }
    .badge {
      display: inline-block;
      padding: 2px 10px; border-radius: 999px;
      font-size: 12px; font-weight: 700;
    }
    .badge-pending  { background: #fef3c7; color: #92400e; }
    .badge-approved { background: #d1fae5; color: #065f46; }
    .badge-rejected { background: #fee2e2; color: #991b1b; }
    .badge-new-student { background: #ede9fe; color: #5b21b6; }
  </style>
</head>
<body>

<!-- ヘッダー -->
<div class="grad text-white px-5 py-4">
  <div class="max-w-2xl mx-auto flex items-center justify-between">
    <div>
      <h1 class="text-lg font-bold">予約管理ダッシュボード</h1>
      <p class="text-xs opacity-75 mt-0.5">ダンス手帳 管理者専用</p>
    </div>
    <button id="btn-logout" onclick="logout()"
      class="text-xs px-3 py-1.5 rounded-full font-semibold"
      style="background:rgba(255,255,255,0.2); display:none;">
      ログアウト
    </button>
  </div>
</div>

<!-- ════════════════════════════════════════════
     画面①: ログイン
════════════════════════════════════════════ -->
<div id="screen-login" class="max-w-sm mx-auto px-5 py-12">
  <div class="text-center mb-8">
    <div class="w-16 h-16 grad rounded-2xl flex items-center justify-center mx-auto mb-4">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none"
           stroke="white" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h2 class="text-xl font-bold text-gray-800">管理者ログイン</h2>
    <p class="text-sm text-gray-500 mt-1">管理者シークレットを入力してください</p>
  </div>

  <div class="card">
    <label class="block text-sm font-bold text-gray-700 mb-2">
      管理者シークレット
    </label>
    <input id="input-secret" type="password" placeholder="シークレットキーを入力"
      class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 text-base
             focus:outline-none focus:border-indigo-500 transition-colors"
      onkeydown="if(event.key==='Enter') login()">
    <p id="login-error" class="text-red-500 text-sm mt-2" style="display:none;">
      シークレットが正しくありません。
    </p>
    <button onclick="login()"
      class="w-full mt-4 py-3 grad text-white font-bold rounded-xl text-base
             hover:opacity-90 transition-opacity">
      ログイン
    </button>
  </div>

  <p class="text-center text-xs text-gray-400 mt-4">
    ※ シークレットは GAS スクリプトプロパティで設定します
  </p>
</div>

<!-- ════════════════════════════════════════════
     画面②: ダッシュボード
════════════════════════════════════════════ -->
<div id="screen-dashboard" class="max-w-2xl mx-auto px-4 py-6" style="display:none;">

  <!-- ステータスバー -->
  <div class="flex items-center justify-between mb-4">
    <div>
      <h2 class="text-base font-bold text-gray-800">承認待ち予約リクエスト</h2>
      <p id="req-count" class="text-sm text-gray-500 mt-0.5"></p>
    </div>
    <button onclick="loadRequests()"
      class="flex items-center gap-1.5 text-sm font-semibold text-indigo-600
             bg-indigo-50 px-3 py-2 rounded-xl hover:bg-indigo-100 transition-colors">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
        <path d="M8 16H3v5"/>
      </svg>
      更新
    </button>
  </div>

  <!-- ローディング -->
  <div id="req-spinner" class="flex justify-center py-16">
    <div class="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full spinner"></div>
  </div>

  <!-- リクエスト一覧 -->
  <div id="req-list" style="display:none;"></div>

  <!-- 空状態 -->
  <div id="req-empty" class="text-center py-16" style="display:none;">
    <div class="text-5xl mb-4">🎉</div>
    <p class="text-gray-600 font-semibold">承認待ちのリクエストはありません</p>
    <p class="text-gray-400 text-sm mt-1">すべて対応済みです</p>
  </div>
</div>

<!-- ════════════════════════════════════════════
     モーダル: 却下理由入力
════════════════════════════════════════════ -->
<div id="reject-modal" class="fixed inset-0 z-50 flex items-center justify-center px-4"
     style="display:none !important; background:rgba(0,0,0,0.5);">
  <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
    <h3 class="text-base font-bold text-gray-800 mb-3">却下理由（任意）</h3>
    <textarea id="reject-note" rows="3" placeholder="理由を入力（省略可）"
      class="w-full border-2 border-gray-200 rounded-xl px-3 py-2.5 text-sm
             focus:outline-none focus:border-indigo-500 transition-colors resize-none"></textarea>
    <p id="reject-error" class="text-red-500 text-sm mt-2" style="display:none;"></p>
    <div class="flex gap-3 mt-4">
      <button onclick="closeRejectModal()"
        class="flex-1 py-2.5 border-2 border-gray-200 rounded-xl text-gray-600
               font-semibold text-sm hover:bg-gray-50 transition-colors">
        キャンセル
      </button>
      <button id="reject-confirm-btn" onclick="confirmReject()"
        class="flex-1 py-2.5 bg-red-500 text-white rounded-xl font-bold text-sm
               hover:bg-red-600 transition-colors">
        却下する
      </button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════
     JavaScript
════════════════════════════════════════════ -->
<script>
// ─── 定数 ─────────────────────────────────────────────────────────────────────

const API_URL = 'https://script.google.com/macros/s/AKfycbxoYZ1uagSAaoF3PSRl0DBkpD1xSDxfMUVI1tg3Q-sq8eYxXUGTBmE_BmJ9w8ONUC8/exec';

const STUDIO_LABELS = {
  saito:  '齊藤DG（lime）',
  sendai: '仙台SS（orange）',
  izumi:  '泉中央（blue）',
};

// ─── 状態変数 ─────────────────────────────────────────────────────────────────

let adminSecret = '';
let rejectTargetId = null;  // 却下モーダルで操作中のリクエスト ID

// ─── ローカルストレージ ────────────────────────────────────────────────────────

/**
 * ページを開いたとき、前回保存したシークレットがあれば自動ログイン試行する。
 * セキュリティ上、ブラウザを閉じても使えるようにする（ブックマーク運用を想定）。
 */
window.addEventListener('load', function() {
  const saved = localStorage.getItem('admin_secret');
  if (saved) {
    adminSecret = saved;
    showDashboard();
  }
});

// ─── ログイン / ログアウト ────────────────────────────────────────────────────

/**
 * ログインボタンを押したとき。
 * シークレットを保存してダッシュボードへ遷移する。
 * 実際の認証は API を呼ぶときに GAS 側で行われる。
 */
async function login() {
  const input = document.getElementById('input-secret').value.trim();
  if (!input) return;

  // 仮のシークレットをセットして API を叩いて認証確認
  adminSecret = input;
  document.getElementById('login-error').style.display = 'none';

  try {
    // booking_requests を取得して認証確認（エラーなら UNAUTHORIZED が返る）
    await apiFetch({ action: 'booking_requests', secret: adminSecret });
    localStorage.setItem('admin_secret', adminSecret);
    showDashboard();
  } catch (err) {
    adminSecret = '';
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('login-error').textContent =
      err.message.includes('認証') ? 'シークレットが正しくありません。' : err.message;
  }
}

function logout() {
  localStorage.removeItem('admin_secret');
  adminSecret = '';
  document.getElementById('screen-dashboard').style.display = 'none';
  document.getElementById('screen-login').style.display     = 'block';
  document.getElementById('btn-logout').style.display       = 'none';
  document.getElementById('input-secret').value = '';
}

// ─── 画面遷移 ─────────────────────────────────────────────────────────────────

function showDashboard() {
  document.getElementById('screen-login').style.display     = 'none';
  document.getElementById('screen-dashboard').style.display = 'block';
  document.getElementById('btn-logout').style.display       = 'inline-block';
  loadRequests();
}

// ─── API ヘルパー ─────────────────────────────────────────────────────────────

/**
 * GAS Web App を GET リクエストで呼ぶ共通ヘルパー。
 * GAS は POST で 302 リダイレクトを返すことがあり body が失われるため、
 * 管理画面からはすべて GET クエリパラメータで操作する。
 */
async function apiFetch(params) {
  const url = API_URL + '?' + new URLSearchParams(params).toString();
  const res = await fetch(url, { redirect: 'follow' });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (!json.success) {
    throw new Error((json.error && json.error.message) || 'APIエラー');
  }
  return json.data;
}

// ─── 予約リクエスト一覧の取得・描画 ──────────────────────────────────────────

async function loadRequests() {
  document.getElementById('req-spinner').style.display = 'flex';
  document.getElementById('req-list').style.display    = 'none';
  document.getElementById('req-empty').style.display   = 'none';

  try {
    const requests = await apiFetch({ action: 'booking_requests', secret: adminSecret });
    renderRequests(requests);
  } catch (err) {
    if (err.message.includes('認証')) {
      logout();
      return;
    }
    document.getElementById('req-spinner').style.display = 'none';
    alert('一覧の取得に失敗しました：' + err.message);
  }
}

/**
 * 予約リクエスト一覧を HTML に描画する。
 * @param {Object[]} requests  booking_requests シートの pending レコード配列
 */
function renderRequests(requests) {
  document.getElementById('req-spinner').style.display = 'none';

  if (!requests || requests.length === 0) {
    document.getElementById('req-empty').style.display = 'block';
    document.getElementById('req-count').textContent   = '';
    return;
  }

  // 日付の新しい順に並べる
  const sorted = requests.slice().sort(function(a, b) {
    return (b.requested_date + b.requested_start).localeCompare(
            a.requested_date + a.requested_start);
  });

  document.getElementById('req-count').textContent =
    sorted.length + ' 件の承認待ちリクエスト';

  document.getElementById('req-list').innerHTML = sorted.map(function(req) {
    const studio      = STUDIO_LABELS[req.studio_id] || req.studio_id;
    const dateLabel   = formatDate(req.requested_date);
    const timeLabel   = req.requested_start + ' 〜 ' + req.requested_end;
    const isNewStudent = !req.student_id || req.student_id === '';

    return `
    <div class="card" id="req-card-${req.request_id}">

      <!-- リクエスト ID + ステータス -->
      <div class="flex items-center justify-between mb-3">
        <span class="text-xs text-gray-400 font-mono">
          #${req.request_id}
          <span class="ml-1 text-gray-300">·</span>
          ${req.requested_at || ''}
        </span>
        <div class="flex gap-1.5 items-center">
          ${isNewStudent
            ? '<span class="badge badge-new-student">新規仮登録</span>'
            : '<span class="badge" style="background:#e0e7ff;color:#3730a3;">既存生徒</span>'}
          <span class="badge badge-pending">承認待ち</span>
        </div>
      </div>

      <!-- 日時・スタジオ -->
      <div class="mb-3">
        <p class="text-lg font-bold text-gray-900">${dateLabel}</p>
        <p class="text-base font-semibold text-indigo-600 mt-0.5">${timeLabel}</p>
        <p class="text-sm text-gray-500 mt-1">🏢 ${studio}</p>
      </div>

      <!-- 生徒情報 -->
      <div class="bg-gray-50 rounded-xl p-3 mb-3">
        <div class="flex items-center gap-2 mb-1">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="#6b7280" stroke-width="2.5" stroke-linecap="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span class="text-sm font-bold text-gray-700">${escapeHtml(req.student_name_input || '（名前なし）')}</span>
          ${req.student_id
            ? `<span class="text-xs text-gray-400">生徒ID: ${req.student_id}</span>`
            : '<span class="text-xs text-red-400">⚠ student_id 未設定</span>'}
        </div>
        ${req.line_user_id
          ? `<p class="text-xs text-gray-400 font-mono pl-5">LINE: ${escapeHtml(req.line_user_id)}</p>`
          : '<p class="text-xs text-gray-400 pl-5">LINE ID なし</p>'}
      </div>

      <!-- メモ -->
      ${req.note
        ? `<div class="bg-amber-50 border border-amber-200 rounded-xl px-3 py-2 mb-3">
             <p class="text-xs text-amber-700">
               <span class="font-bold">メモ:</span> ${escapeHtml(req.note)}
             </p>
           </div>`
        : ''}

      <!-- 承認・却下ボタン -->
      <div class="flex gap-3 mt-1">
        <button onclick="approveRequest(${req.request_id})"
          id="btn-approve-${req.request_id}"
          class="flex-1 py-2.5 grad text-white font-bold text-sm rounded-xl
                 hover:opacity-90 transition-opacity disabled:opacity-40">
          ✓ 承認する
        </button>
        <button onclick="openRejectModal(${req.request_id})"
          id="btn-reject-${req.request_id}"
          class="flex-1 py-2.5 bg-red-50 border-2 border-red-200 text-red-600
                 font-bold text-sm rounded-xl hover:bg-red-100 transition-colors
                 disabled:opacity-40">
          ✕ 却下する
        </button>
      </div>

      <!-- 操作中メッセージ（非表示） -->
      <p id="req-msg-${req.request_id}" class="text-sm text-center mt-2 font-semibold"
         style="display:none;"></p>
    </div>`;
  }).join('');

  document.getElementById('req-list').style.display = 'block';
}

// ─── 承認処理 ─────────────────────────────────────────────────────────────────

/**
 * 「承認する」ボタンを押したとき。
 * @param {number} requestId
 */
async function approveRequest(requestId) {
  if (!confirm('予約リクエスト #' + requestId + ' を承認しますか？\n生徒に LINE 通知が送信されます。')) {
    return;
  }

  setCardBusy(requestId, true, '承認処理中...');

  try {
    const result = await apiFetch({
      action:    'approve',
      requestId: requestId,
      secret:    adminSecret,
    });
    showCardResult(requestId, 'approved', '✓ 承認しました（レッスン ID: ' + result.lesson_id + '）');
  } catch (err) {
    setCardBusy(requestId, false);
    showCardError(requestId, '承認に失敗しました: ' + err.message);
  }
}

// ─── 却下処理 ─────────────────────────────────────────────────────────────────

/**
 * 「却下する」ボタンを押したとき: 理由入力モーダルを開く。
 * @param {number} requestId
 */
function openRejectModal(requestId) {
  rejectTargetId = requestId;
  document.getElementById('reject-note').value            = '';
  document.getElementById('reject-error').style.display   = 'none';
  document.getElementById('reject-modal').style.display   = 'flex';
}

function closeRejectModal() {
  rejectTargetId = null;
  document.getElementById('reject-modal').style.display   = 'none';
}

/**
 * モーダルの「却下する」ボタンを押したとき。
 */
async function confirmReject() {
  const note = document.getElementById('reject-note').value.trim();
  const btn  = document.getElementById('reject-confirm-btn');
  btn.disabled    = true;
  btn.textContent = '処理中...';

  try {
    await apiFetch({
      action:    'reject',
      requestId: rejectTargetId,
      secret:    adminSecret,
      note:      note,
    });
    closeRejectModal();
    showCardResult(rejectTargetId, 'rejected', '✕ 却下しました');
  } catch (err) {
    document.getElementById('reject-error').textContent   = '却下に失敗しました: ' + err.message;
    document.getElementById('reject-error').style.display = 'block';
  } finally {
    btn.disabled    = false;
    btn.textContent = '却下する';
  }
}

// ─── カード UI ヘルパー ────────────────────────────────────────────────────────

/** ボタンを無効化してローディングメッセージを表示する */
function setCardBusy(requestId, busy, msg) {
  const approveBtn = document.getElementById('btn-approve-' + requestId);
  const rejectBtn  = document.getElementById('btn-reject-'  + requestId);
  const msgEl      = document.getElementById('req-msg-'     + requestId);

  if (approveBtn) approveBtn.disabled = busy;
  if (rejectBtn)  rejectBtn.disabled  = busy;

  if (msg) {
    msgEl.textContent   = msg;
    msgEl.style.display = 'block';
    msgEl.style.color   = '#6b7280';
  } else {
    msgEl.style.display = 'none';
  }
}

/** 承認 or 却下完了後にカードを完了状態に切り替える */
function showCardResult(requestId, type, msg) {
  const card       = document.getElementById('req-card-' + requestId);
  const approveBtn = document.getElementById('btn-approve-' + requestId);
  const rejectBtn  = document.getElementById('btn-reject-'  + requestId);
  const msgEl      = document.getElementById('req-msg-'     + requestId);

  if (approveBtn) approveBtn.style.display = 'none';
  if (rejectBtn)  rejectBtn.style.display  = 'none';

  if (msgEl) {
    msgEl.textContent   = msg;
    msgEl.style.display = 'block';
    msgEl.style.color   = type === 'approved' ? '#059669' : '#dc2626';
  }

  if (card) {
    card.style.opacity = '0.6';
    card.style.transition = 'opacity 0.3s ease';
    // 2秒後にカードを削除してカウント更新
    setTimeout(function() {
      card.style.opacity = '0';
      setTimeout(function() {
        card.remove();
        updateCount();
      }, 300);
    }, 2000);
  }
}

/** エラーメッセージをカードに表示する */
function showCardError(requestId, msg) {
  const msgEl = document.getElementById('req-msg-' + requestId);
  if (!msgEl) return;
  msgEl.textContent   = msg;
  msgEl.style.display = 'block';
  msgEl.style.color   = '#dc2626';
}

/** 残リクエスト数を更新する */
function updateCount() {
  const cards = document.querySelectorAll('[id^="req-card-"]');
  const count = cards.length;
  document.getElementById('req-count').textContent =
    count > 0 ? count + ' 件の承認待ちリクエスト' : '';
  if (count === 0) {
    document.getElementById('req-list').style.display  = 'none';
    document.getElementById('req-empty').style.display = 'block';
  }
}

// ─── ユーティリティ ────────────────────────────────────────────────────────────

/** 'YYYY-MM-DD' → '○月○日（曜日）' に変換する */
function formatDate(dateStr) {
  if (!dateStr) return '';
  const [, m, d] = dateStr.split('-');
  const date = new Date(dateStr + 'T00:00:00');
  const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
  return parseInt(m) + '月' + parseInt(d) + '日（' + dayNames[date.getDay()] + '）';
}

/** XSS 対策: HTML 特殊文字をエスケープする */
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
</script>
</body>
</html>
