<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ダンス手帳</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', 'Yu Gothic', sans-serif;
      overscroll-behavior: none;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }

    .calendar-scroll { overflow-y: scroll; -webkit-overflow-scrolling: touch; }

    #modal-overlay {
      position: absolute; inset: 0; z-index: 50;
      display: none; align-items: flex-end;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(3px);
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    #modal-sheet {
      width: 100%; background: white;
      border-radius: 28px 28px 0 0;
      overflow: hidden;
      max-height: 88%;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
    }
    #modal-content { overflow-y: auto; max-height: calc(88dvh - 20px); }

    .evt { cursor: pointer; transition: opacity 0.12s, transform 0.12s; }
    .evt:active { opacity: 0.78; transform: scale(0.97); }

    .day-btn { transition: all 0.12s; }
    .day-btn:active { transform: scale(0.92); opacity: 0.7; }

    .nav-btn { transition: background 0.1s; border-radius: 50%; }
    .nav-btn:active { background: rgba(0,0,0,0.07) !important; }

    .tab-btn:active { opacity: 0.6; }
    .task-row { transition: background 0.1s; }
    .task-row:active { background: #f9fafb !important; }

    .student-card { transition: background 0.1s, transform 0.1s; cursor: pointer; }
    .student-card:active { background: #f8f9fa !important; transform: scale(0.99); }

    textarea, input[type="text"], select {
      -webkit-appearance: none; outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    textarea:focus, input[type="text"]:focus { border-color: #6366f1 !important; background: white !important; }
    input[type="checkbox"] { accent-color: #6366f1; }

    @media (min-width: 430px) {
      #app { border-radius: 48px; }
      body { display: flex; justify-content: center; align-items: flex-start; padding: 24px 0; }
    }
    @media (max-width: 429px) {
      #app { height: 100dvh !important; }
    }
  </style>
</head>
<body>

</div><!-- /app -->

// ─── ヘルパー ──────────────────────────────────────────────────────────────────
function lessonCountForEvt(evt) {
  if (lessonCountOverrides[evt.id] !== undefined) return lessonCountOverrides[evt.id];
  return Math.max(1, Math.round(durMins(evt.start, evt.end) / 25));
}
function isCancelled(evt) { return lessonCountForEvt(evt) === 0; }
function getTicket(studentId, fallbackTicketId) {
  const id = studentTicketData[studentId] || fallbackTicketId || 'single';
  return TICKET_TYPES.find(t => t.id === id) || TICKET_TYPES[0];
}
function getMemoHistory(student) {
  const extra = studentMemoHistory[student.id] || [];
  return [...extra, ...student.memoHistory]; // 新しい順
}
function hasLessonToday(studentName) {
  return (WEEK_EVENTS[currentDay] || []).some(e => e.type === 'lesson' && e.name === studentName);
}

// ─── DAY SELECTOR ─────────────────────────────────────────────────────────────
function buildDaySelector() {
  const cont = document.getElementById('day-selector');
  cont.innerHTML = '';
  DAY_LABELS.forEach((lbl, i) => {
    const isSat = i === 5, isSun = i === 6;
    const lessonCount = (WEEK_EVENTS[i] || []).filter(e => e.type === 'lesson').length;
    const btn = document.createElement('button');
    btn.dataset.day = i;
    btn.className = 'day-btn';
    btn.style.cssText = 'display:flex;flex-direction:column;align-items:center;padding:5px 2px;border:none;background:transparent;cursor:pointer;border-radius:12px;';
    btn.onclick = () => selectDay(i);

    const lColor = isSun ? '#f87171' : isSat ? '#60a5fa' : '#9ca3af';
    btn.innerHTML = `
      <span id="dl-${i}" style="font-size:11px;font-weight:600;color:${lColor};">${lbl}</span>
      <span id="dn-${i}" style="font-size:14px;font-weight:600;color:${isSun?'#f87171':isSat?'#60a5fa':'#374151'};width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin:1px 0;">${DAY_DATES[i]}</span>
      <div id="dd-${i}" style="width:4px;height:4px;border-radius:50%;background:${lessonCount>0?'#a5b4fc':'transparent'};margin-top:1px;"></div>
    `;
    cont.appendChild(btn);
  });
  highlightDay(2);
}

// 現在表示週の指定曜日イベントを返す
function getEventsForDay(dayIdx) {
  const base = WEEK_EVENTS[dayIdx] || [];
  if (currentWeekOffset === 0) return base;
  const recurring = base.filter(e => e.repeat);
  const extras    = ((weeklyAdditions[currentWeekOffset] || {})[dayIdx]) || [];
  return [...recurring, ...extras];
}

// 週オフセット → ラベル
function weekLabel(offset) {
  if (offset === 0)  return '今週';
  if (offset === 1)  return '来週';
  if (offset === -1) return '先週';
  return offset > 0 ? `${offset}週後` : `${-offset}週前`;
}

function selectDay(idx) {
  currentDay = idx;
  highlightDay(idx);
  renderCalendar(idx);
  const lessons    = getEventsForDay(idx).filter(e => e.type === 'lesson');
  const totalCount = lessons.reduce((sum, e) => sum + lessonCountForEvt(e), 0);
  const day = ['月','火','水','木','金','土','日'][idx];
  const wk  = currentWeekOffset !== 0 ? `【${weekLabel(currentWeekOffset)}】 ` : '';
  document.getElementById('date-subtitle').textContent =
    `${wk}4月${DAY_DATES[idx]}日（${day}）· ${totalCount > 0 ? `本日 ${totalCount}レッスン` : idx === 6 ? '🌸 完全休日' : '予定なし'}`;
}

function highlightDay(active) {
  DAY_LABELS.forEach((_, i) => {
    const lEl = document.getElementById(`dl-${i}`);
    const nEl = document.getElementById(`dn-${i}`);
    if (!lEl || !nEl) return;
    const isSat = i===5, isSun = i===6;
    if (i === active) {
      lEl.style.color = '#6366f1'; lEl.style.fontWeight = '700';
      nEl.style.cssText = 'font-size:14px;font-weight:700;color:white;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin:1px 0;background:#6366f1;';
    } else {
      lEl.style.color = isSun ? '#f87171' : isSat ? '#60a5fa' : '#9ca3af';
      lEl.style.fontWeight = '600';
      nEl.style.cssText = `font-size:14px;font-weight:600;color:${isSun?'#f87171':isSat?'#60a5fa':'#374151'};width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin:1px 0;background:transparent;`;
    }
  });
}

// ─── CALENDAR RENDER ──────────────────────────────────────────────────────────
function renderCalendar(dayIdx) {
  const tAxis = document.getElementById('time-axis');
  const eArea = document.getElementById('events-area');
  tAxis.innerHTML = '';
  eArea.innerHTML = '';

  // Grid
  for (let h = START_H; h <= END_H; h++) {
    const top = timeToTop(h);
    mkAbsDiv(eArea, `left:0;right:0;top:${top}px;height:1px;background:#e5e7eb;`);
    if (h < END_H) mkAbsDiv(eArea, `left:0;right:0;top:${top+SLOT_H}px;height:1px;background:#f3f4f6;`);
    const lbl = document.createElement('div');
    lbl.style.cssText = `position:absolute;right:7px;top:${top-9}px;font-size:11px;color:#9ca3af;font-weight:500;user-select:none;`;
    lbl.textContent = `${h}:00`;
    tAxis.appendChild(lbl);
  }

  // Sunday empty state
  if (dayIdx === 6) {
    const msg = mkAbsDiv(eArea, 'inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;pointer-events:none;');
    msg.innerHTML = '<div style="font-size:52px;line-height:1;">🌸</div><p style="font-size:15px;font-weight:700;color:#9ca3af;">完全休日</p><p style="font-size:12px;color:#d1d5db;">ゆっくり充電しましょう</p>';
    return;
  }

  const dayEvents = getEventsForDay(dayIdx);

  // Zone backgrounds
  dayEvents.filter(e => e.type === 'zone').forEach(z => {
    const top = timeToTop(z.start[0], z.start[1]);
    const h   = durToH(durMins(z.start, z.end));
    mkAbsDiv(eArea, `left:0;right:0;top:${top}px;height:${h}px;background:${z.bg};border-left:3px solid ${z.zb};pointer-events:none;`);
    const zLbl = mkAbsDiv(eArea, `right:8px;top:${top+6}px;pointer-events:none;font-size:9px;font-weight:800;color:${z.zb};letter-spacing:0.08em;`);
    zLbl.textContent = `@${z.loc}`;
  });

  // Current time indicator (Wednesday only for demo)
  if (dayIdx === 2) {
    const now  = new Date();
    const mins = now.getHours()*60 + now.getMinutes();
    const sMin = START_H*60;
    if (mins >= sMin && mins <= END_H*60) {
      const top = (mins - sMin) / 30 * SLOT_H;
      const line = mkAbsDiv(eArea, `left:0;right:0;top:${top}px;height:2px;background:#ef4444;z-index:15;pointer-events:none;`);
      line.innerHTML = `<div style="position:absolute;left:-1px;top:-4px;width:10px;height:10px;border-radius:50%;background:#ef4444;"></div>`;
    }
  }

  // Events
  dayEvents.filter(e => e.type !== 'zone').forEach(evt => {
    const top = timeToTop(evt.start[0], evt.start[1]);
    const hp  = durToH(durMins(evt.start, evt.end));
    const s   = S[evt.style] || S.gray;

    const el = document.createElement('div');
    el.className = 'evt';
    el.style.cssText = `
      position:absolute; left:10px; right:10px;
      top:${top+2}px; height:${hp-4}px;
      background:${s.bg}; border:1.5px solid ${s.border};
      border-left:3px solid ${s.accent};
      border-radius:10px; padding:5px 8px; overflow:hidden;
      z-index:10; box-shadow:0 1px 4px rgba(0,0,0,0.07);
    `;

    if (evt.type === 'lesson') {
      const student   = STUDENTS.find(st => st.name === evt.name);
      const ticket    = getTicket(student?.id, student?.ticket);
      const lCount    = lessonCountForEvt(evt);
      const cancelled = lCount === 0;
      const showLoc   = hp >= 72;
      const showTime  = hp >= 82;
      const showBadge = hp >= 52;
      if (cancelled) {
        el.style.opacity = '0.45';
        el.style.background = '#f3f4f6';
        el.style.borderColor = '#d1d5db';
        el.style.borderLeft = '3px solid #9ca3af';
      }
      el.innerHTML = `
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:4px;height:100%;">
          <div style="flex:1;min-width:0;overflow:hidden;">
            <div style="font-size:13px;font-weight:700;color:${cancelled?'#9ca3af':s.text};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;${cancelled?'text-decoration:line-through;':''}">${evt.name}</div>
            ${showLoc && !cancelled ? `<div style="font-size:10px;color:${s.accent};margin-top:2px;font-weight:600;">${evt.loc}</div>` : ''}
            ${cancelled ? `<div style="font-size:10px;color:#ef4444;font-weight:700;margin-top:2px;">キャンセル</div>` : ''}
          </div>
          ${!cancelled ? `
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;">
            ${showBadge ? `<span style="font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;white-space:nowrap;background:${ticket.bg};color:${ticket.color};">${ticket.label}</span>` : ''}
            ${showBadge ? `<span style="font-size:9px;font-weight:700;color:${s.accent};white-space:nowrap;">${lCount}レッスン</span>` : ''}
            ${evt.repeat && showBadge ? `<span style="font-size:9px;color:#6366f1;font-weight:700;white-space:nowrap;">🔁</span>` : ''}
            ${showTime  ? `<span style="font-size:9px;color:#9ca3af;white-space:nowrap;">${fmtTime(evt.start)}–${fmtTime(evt.end)}</span>` : ''}
          </div>` : ''}
        </div>`;
      el.addEventListener('click', () => openLessonModal(evt));
    } else {
      el.style.background  = '#f3f4f6';
      el.style.border      = 'none';
      el.style.borderLeft  = '3px solid #d1d5db';
      el.style.borderRadius = '6px';
      el.style.cursor      = 'default';
      el.style.opacity     = '0.7';
      el.innerHTML = '';
    }
    eArea.appendChild(el);
  });
}

function mkAbsDiv(parent, css) {
  const d = document.createElement('div');
  d.style.cssText = `position:absolute;${css}`;
  parent.appendChild(d);
  return d;
}

function addSalesEntry() {
  const name   = document.getElementById('sales-name')?.value?.trim();

function exportSalesCSV() {
  const day = ['月','火','水','木','金','土','日'][currentDay];
  const dateStr = `4月${DAY_DATES[currentDay]}日`;
  const header = '名称,金額,日付,メモ\n';
  const body = salesData.map(x => `${x.name},${x.amount},${x.date},${x.memo}`).join('\n');
  const total = salesData.reduce((s,x) => s + x.amount, 0);
  const footer = `\n合計,${total},,`;
  const csv = '\uFEFF' + header + body + footer;
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `売上_${dateStr}.csv`; a.click();
  URL.revokeObjectURL(url);
}

function makeTaskEl(task) {
  const el = document.createElement('div');
  el.className = 'task-row';

function toggleTask(id) {
  const t = taskData.find(t => t.id === id);

function adjustLessonCount(evtId, delta) {
  const evt = Object.values(WEEK_EVENTS).flat().find(e => e.id === evtId);
  const base = evt ? Math.max(1, Math.round(durMins(evt.start, evt.end) / 25)) : 1;
  const current = lessonCountOverrides[evtId] !== undefined ? lessonCountOverrides[evtId] : base;
  const next = Math.max(0, current + delta);
  lessonCountOverrides[evtId] = next;
  const disp = document.getElementById('lesson-count-disp');
  if (disp) {
    disp.textContent = next === 0 ? 'Cancel' : String(next);
    disp.style.color  = next === 0 ? '#ef4444' : '#6366f1';
    disp.nextElementSibling.textContent = next === 0 ? 'キャンセル済み' : '枚消費';
  }
  const btn = document.getElementById('cancel-btn');
  if (btn) {
    btn.textContent      = next === 0 ? '解除' : 'キャンセル';
    btn.style.background = next === 0 ? '#fef2f2' : '#f3f4f6';
    btn.style.color      = next === 0 ? '#ef4444' : '#6b7280';
  }
  renderCalendar(currentDay);
}

function toggleRepeat(evtId) {
  // WEEK_EVENTS と weeklyAdditions を両方検索
  let found = Object.values(WEEK_EVENTS).flat().find(e => e.id === evtId);
  if (!found) {
    for (const wk of Object.values(weeklyAdditions)) {
      for (const day of Object.values(wk)) {
        found = day.find(e => e.id === evtId);
        if (found) break;
      }
      if (found) break;
    }
  }
  if (!found) return;
  found.repeat = !found.repeat;
  // ボタン表示を更新
  const btn = document.getElementById('repeat-toggle-btn');
  if (btn) {
    const on = found.repeat;
    btn.textContent = on ? '🔁 毎週繰り返し：ON' : '🔁 毎週繰り返し：OFF';
    btn.style.background   = on ? '#ede9fe' : '#f3f4f6';
    btn.style.color        = on ? '#6d28d9' : '#6b7280';
    btn.style.borderColor  = on ? '#c4b5fd' : '#e5e7eb';
  }
  // カレンダーを即時再描画
  renderCalendar(currentDay);
}

function toggleCancel(evtId) {
  const evt = Object.values(WEEK_EVENTS).flat().find(e => e.id === evtId);
  const base = evt ? Math.max(1, Math.round(durMins(evt.start, evt.end) / 25)) : 1;
  const current = lessonCountOverrides[evtId] !== undefined ? lessonCountOverrides[evtId] : base;
  adjustLessonCount(evtId, current === 0 ? base : -current);
}

function addEvent() {
  const name = document.getElementById('add-event-name')?.value?.trim();
  if (!name) { document.getElementById('add-event-name')?.focus(); return; }
  const sv = document.getElementById('add-event-start')?.value || '9:00';
  const ev = document.getElementById('add-event-end')?.value   || '10:00';
  const [sh,sm] = sv.split(':').map(Number);
  const [eh,em] = ev.split(':').map(Number);
  if (eh*60+em <= sh*60+sm) { alert('終了時刻は開始より後にしてください'); return; }
  const studio = STUDIOS[_newEvtLoc];
  const newEvt = _newEvtType === 'lesson'
    ? { type:'lesson', id:nextEventId++, start:[sh,sm], end:[eh,em], name, loc:'@'+studio.loc, style:studio.style }
    : { type:'block',  id:nextEventId++, start:[sh,sm], end:[eh,em], label:name, sub:'', repeat:false, style:'gray' };
  if (currentWeekOffset === 0) {
    if (!WEEK_EVENTS[currentDay]) WEEK_EVENTS[currentDay] = [];
    WEEK_EVENTS[currentDay].push(newEvt);
  } else {
    if (!weeklyAdditions[currentWeekOffset]) weeklyAdditions[currentWeekOffset] = {};
    if (!weeklyAdditions[currentWeekOffset][currentDay]) weeklyAdditions[currentWeekOffset][currentDay] = [];
    weeklyAdditions[currentWeekOffset][currentDay].push(newEvt);
  }
  closeModal();
  setTimeout(() => { selectDay(currentDay); }, 350);
}

        </div>
        <button onclick="exportDailyCSV()" 
          style="padding:8px 14px;background:#059669;color:white;font-size:12px;font-weight:700;border-radius:12px;border:none;cursor:pointer;font-family:inherit;">
          📥 Excel保存
        </button>
      </div>
    </div>
    <div style="padding:14px 20px;">
      <table style="width:100%;border-collapse:collapse;">
        <thead>
          <tr style="background:#f8f9fa;border-radius:10px;overflow:hidden;">
            <th style="padding:8px 10px;text-align:left;font-size:10px;font-weight:700;color:#6b7280;letter-spacing:0.06em;text-transform:uppercase;">生徒名</th>
            <th style="padding:8px 10px;text-align:center;font-size:10px;font-weight:700;color:#6b7280;letter-spacing:0.06em;text-transform:uppercase;">チケット</th>
            <th style="padding:8px 10px;text-align:center;font-size:10px;font-weight:700;color:#6b7280;letter-spacing:0.06em;text-transform:uppercase;">枚数</th>
          </tr>
        </thead>
        <tbody>${tableRows}</tbody>
        <tfoot>
          <tr style="background:#f0f4ff;border-top:2px solid #e0e7ff;">
            <td colspan="2" style="padding:10px 10px;font-size:13px;font-weight:700;color:#4f46e5;">合計</td>
            <td style="padding:10px 10px;text-align:center;font-size:16px;font-weight:900;color:#4f46e5;">${totalCount}</td>
          </tr>
        </tfoot>
      </table>
    </div>
    <div style="padding:0 20px 32px;">
      <button onclick="closeModal()"
        style="width:100%;background:#f3f4f6;color:#6b7280;font-weight:700;padding:14px;border-radius:16px;border:none;font-size:14px;cursor:pointer;font-family:inherit;">閉じる</button>
    </div>`);
}

function exportDailyCSV() {
  const day     = ['月','火','水','木','金','土','日'][currentDay];
  const dateStr = `4月${DAY_DATES[currentDay]}日`;
  const lessons = getEventsForDay(currentDay).filter(e => e.type === 'lesson');

  const header = '生徒名,チケット種別,レッスン数,場所,状態\n';
  const body = lessons.map(evt => {
    const student  = STUDENTS.find(s => s.name === evt.name);
    const ticket   = getTicket(student?.id, student?.ticket);
    const lCount   = lessonCountForEvt(evt);
    const status   = lCount === 0 ? 'キャンセル' : '実施';
    return `${evt.name},${ticket.label},${lCount === 0 ? 0 : lCount},${evt.loc},${status}`;
  }).join('\n');

  const totalCount = lessons.filter(e => lessonCountForEvt(e) > 0).reduce((s,e) => s + lessonCountForEvt(e), 0);
  const footer = `\n合計,,${totalCount},,`;

  const csv = '\uFEFF' + header + body + footer;
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `日報_${dateStr}.csv`; a.click();
  URL.revokeObjectURL(url);
}
</script>
